AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BrightPath Kids AI Story API

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        OPENAI_API_KEY: '{{resolve:secretsmanager:brightpath/openai:SecretString:OPENAI_API_KEY}}'

Resources:
  StoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/story.handler
      CodeUri: .
      Events:
        StoryApi:
          Type: Api
          Properties:
            Path: /story
            Method: post

Outputs:
  ApiUrl:
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/story'